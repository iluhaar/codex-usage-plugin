name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (for example, 0.2.17)
        required: true
        type: string

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Validate version and resolve release source
        id: release
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use the X.Y.Z format."
            exit 1
          fi

          TAG="v$VERSION"
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            git checkout "$TAG"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install --global npm@11

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        if: steps.release.outputs.tag_exists == 'false'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          CURRENT_VERSION="$(node --print "require('./package.json').version")"
          if [[ "$CURRENT_VERSION" != "$VERSION" ]]; then
            npm version "$VERSION" --no-git-tag-version
          fi

      - name: Verify release version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          PACKAGE_VERSION="$(node --print "require('./package.json').version")"
          LOCK_VERSION="$(node --print "require('./package-lock.json').version")"
          if [[ "$PACKAGE_VERSION" != "$VERSION" || "$LOCK_VERSION" != "$VERSION" ]]; then
            echo "Release version does not match package.json and package-lock.json."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Commit and tag release
        if: steps.release.outputs.tag_exists == 'false'
        env:
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if ! git diff --cached --quiet; then
            git commit -m "$VERSION"
            git push origin HEAD:master
          fi
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Check npm registry
        id: npm
        env:
          VERSION: ${{ inputs.version }}
        run: |
          PACKAGE_NAME="$(node --print "require('./package.json').name")"
          if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm.outputs.published == 'false'
        run: npm publish --provenance --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --generate-notes --title "$TAG"
          fi
